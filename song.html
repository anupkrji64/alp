<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Only For You 💖</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  background:linear-gradient(135deg,#ff5f9e,#ff9acb);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* Floating Hearts */
.heart{
  position:absolute;
  font-size:24px;
  animation:float 6s linear infinite;
  opacity:0.7;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

.h1{left:15%;animation-delay:0s;}
.h2{left:35%;animation-delay:2s;}
.h3{left:60%;animation-delay:4s;}
.h4{left:80%;animation-delay:1s;}

/* Main Box */
.container{
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(12px);
  padding:50px 35px;
  border-radius:25px;
  text-align:center;
  width:90%;
  max-width:450px;
  box-shadow:0 10px 35px rgba(0,0,0,0.25);
  color:white;
  z-index:2;
}

h1{
  font-size:30px;
  margin-bottom:25px;
}

.lyrics{
  font-size:24px;
  line-height:1.8;
  min-height:120px;
  font-weight:600;
  animation:fade 0.6s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;transform:translateY(0);}
}

/* Hidden YouTube player */
#yt-player{
  position:absolute;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
}

</style>
</head>

<body>

<!-- Hearts -->
<div class="heart h1">💖</div>
<div class="heart h2">💕</div>
<div class="heart h3">💗</div>
<div class="heart h4">💘</div>

<!-- Main -->
<div class="container">
  <h1>Only For You 💝</h1>
  <div class="lyrics" id="lyrics">▶️ Tap anywhere to start...</div>
</div>

<!-- Hidden YouTube Player -->
<div id="yt-player"></div>

<script>

const lyricsBox = document.getElementById("lyrics");
let player;
let lyricsInterval;
let started = false;

/* Synced Lyrics */
const timedLyrics = [
  { text:"हमरा से पहले ना हमरा से केहु बाद 💖", time:0 },
  { text:"Love you love you कही 💕", time:3.6 },
  { text:"हमरा से पहले ना हमरा से केहु बाद 💗", time:6.0 },
  { text:"Love you love you कही 💞", time:9.5 },
  { text:"हो love you love you कही ❤️", time:12 },
  { text:"हमके बनाला बॉडीगॉर्ड ब्यूटी बनल रही 😍", time:14 },
  { text:"हमके बनाला बॉडीगॉर्ड ब्यूटी बनल रही ✨", time:18 }
];

let index = 0;

function showLyric(currentTime) {
  if (index < timedLyrics.length && currentTime >= timedLyrics[index].time) {
    lyricsBox.innerText = timedLyrics[index].text;
    lyricsBox.style.animation = "none";
    lyricsBox.offsetHeight;
    lyricsBox.style.animation = "fade 0.6s ease";
    index++;
  }
}

function startPlayer() {
  if (started) return;
  started = true;
  if (player && player.playVideo) {
    player.playVideo();
    lyricsInterval = setInterval(() => {
      const t = player.getCurrentTime();
      showLyric(t);
    }, 200);
  }
}

/* YouTube IFrame API */
function onYouTubeIframeAPIReady() {
  player = new YT.Player('yt-player', {
    height: '1',
    width: '1',
    videoId: 'HYBuiZFZ9FU',
    playerVars: {
      autoplay: 1,
      controls: 0,
      fs: 0,
      rel: 0,
      playsinline: 1
    },
    events: {
      onReady: function(e) {
        e.target.setVolume(100);
        e.target.playVideo();
        started = true;
        lyricsInterval = setInterval(() => {
          const t = player.getCurrentTime();
          showLyric(t);
        }, 200);
      },
      onStateChange: function(e) {
        // YT.PlayerState.PLAYING = 1
        if (e.data === 1 && !started) {
          started = true;
          lyricsInterval = setInterval(() => {
            const t = player.getCurrentTime();
            showLyric(t);
          }, 200);
        }
      }
    }
  });
}

/* Tap anywhere to play if autoplay blocked */
document.body.addEventListener("click", startPlayer);

/* Load YouTube API */
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

</script>

</body>
</html>
